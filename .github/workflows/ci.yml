name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"


      - name: Repository hygiene check
        run: |
          if git ls-files | grep -E '(^|/)(\.venv|venv|env|__pycache__|\.pytest_cache|prompt\.md|codexset|\.codex|AGENTS\.md|\.env$|.*\.zip$|.*\.pyc$)'; then
            echo "Refusing to continue because generated/private files are tracked."
            exit 1
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Run tests
        run: |
          python -m compileall -q src scripts tests
          python -m pytest -q
