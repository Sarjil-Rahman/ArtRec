groups:
  - name: artrec_alerts
    rules:
      - alert: HighRequestLatency
        expr: histogram_quantile(0.95, sum(rate(artrec_request_latency_seconds_bucket[5m])) by (le, endpoint)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "ArtRec high latency"
      - alert: ApiErrors
        expr: sum(rate(artrec_requests_total{status="500"}[5m])) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "ArtRec API returning 500 errors"
